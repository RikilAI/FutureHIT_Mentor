<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTURE Mentor — מנטור דיגיטלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF1F8E;
    --pink-light: #FF5BAD;
    --pink-glow: rgba(255, 31, 142, 0.15);
    --pink-border: rgba(255, 31, 142, 0.3);
    --amber: #c8954a;
    --amber-glow: rgba(200, 149, 74, 0.2);
    --black: #0e0e0e;
    --dark: #1a1a1a;
    --dark-2: #222222;
    --dark-3: #2a2a2a;
    --surface: #0e0e0e;
    --surface-2: #1a1a1a;
    --surface-3: #2a2a2a;
    --text-primary: #ffffff;
    --text-secondary: #cccccc;
    --text-muted: #888888;
    --white: #ffffff;
    --radius: 18px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-pink: 0 8px 32px rgba(255, 31, 142, 0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans Hebrew', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 780px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── BACKGROUND GRID ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,31,142,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,31,142,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
    line-height: 0;
    margin-bottom: 16px;
  }

  .header img.header-banner {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,31,142,0.12);
    border: 1px solid rgba(255,31,142,0.2);
    border-radius: 20px;
    padding: 5px 12px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--pink);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status-text {
    font-size: 11px;
    color: var(--pink-light);
    font-weight: 500;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ─── CHAT AREA ─── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

  /* ─── MESSAGES ─── */
  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: msg-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message-row.mentor { flex-direction: row; }
  .message-row.user   { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    position: relative;
  }

  .avatar.mentor-avatar {
    background: var(--black);
    border: 2px solid rgba(255,255,255,0.3);
    color: var(--white);
    box-shadow: 0 0 12px rgba(255,255,255,0.1);
    overflow: hidden;
  }

  .avatar.mentor-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0) invert(1);
    padding: 6px;
  }

  .avatar.user-avatar {
    background: var(--dark-3);
    border: 2px solid var(--surface-3);
    color: var(--text-secondary);
    font-size: 13px;
  }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: calc(100% - 54px);
  }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.65;
    font-weight: 400;
    white-space: pre-line;
    position: relative;
  }

  .mentor-bubble {
    background: var(--dark-2);
    color: var(--white);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .user-bubble {
    background: var(--black);
    color: var(--white);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .message-time {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 4px;
  }
  .message-row.user .message-time { text-align: left; }
  .message-row.mentor .message-time { text-align: right; }

  /* ─── TYPING INDICATOR ─── */
  .typing-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: msg-in 0.3s ease both;
  }

  .typing-bubble {
    background: var(--white);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--pink);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50%       { transform: translateY(-5px); opacity: 1; }
  }

  /* ─── STATUS CARD ─── */
  .status-card {
    background: var(--black);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,31,142,0.2);
    animation: card-reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    margin: 4px 0;
  }

  @keyframes card-reveal {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    background: linear-gradient(135deg, #111 0%, #1c0a11 100%);
    padding: 20px 22px 18px;
    border-bottom: 1px solid rgba(255,31,142,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -30px;
    left: -30px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255,31,142,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-logo-area img {
    height: 28px;
    width: auto;
    filter: brightness(0) invert(1);
  }

  .card-logo-fallback {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .card-logo-fallback span { color: var(--pink); }

  .card-badge {
    background: var(--pink);
    color: var(--white);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    font-family: 'Syne', sans-serif;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .card-body {
    padding: 4px 0;
  }

  .card-section {
    padding: 16px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: section-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .card-section:last-child { border-bottom: none; }

  .card-section:nth-child(1) { animation-delay: 0.1s; }
  .card-section:nth-child(2) { animation-delay: 0.25s; }
  .card-section:nth-child(3) { animation-delay: 0.4s; }

  @keyframes section-in {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::before {
    content: '';
    display: inline-block;
    width: 14px;
    height: 2px;
    background: var(--pink);
    border-radius: 1px;
    flex-shrink: 0;
  }

  .section-content {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
  }

  .card-footer {
    padding: 14px 22px;
    background: rgba(255,31,142,0.06);
    border-top: 1px solid rgba(255,31,142,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-footer-icon {
    font-size: 16px;
  }

  .card-footer-text {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    font-style: italic;
  }

  /* ─── DIVIDER ─── */
  .chat-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 8px;
    opacity: 0.5;
  }

  .chat-divider::before,
  .chat-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface-3);
  }

  .divider-text {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ─── INPUT AREA ─── */
  .input-area {
    position: sticky;
    bottom: 0;
    z-index: 100;
    padding: 12px 16px 16px;
    background: linear-gradient(to top, var(--surface) 80%, transparent);
    flex-shrink: 0;
  }

  .input-inner {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--dark-2);
    border: 1.5px solid var(--surface-3);
    border-radius: 20px;
    padding: 10px 10px 10px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 0 0px var(--pink-border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-inner:focus-within {
    border-color: var(--pink-border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 0 0 3px var(--pink-glow);
  }

  #user-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-primary);
    background: transparent;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    overflow-y: auto;
    direction: rtl;
  }

  #user-input::placeholder {
    color: var(--text-muted);
  }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

  .send-btn {
    width: 40px;
    height: 40px;
    background: var(--black);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: var(--pink);
    box-shadow: var(--shadow-pink);
    transform: scale(1.05);
  }

  .send-btn:active { transform: scale(0.95); }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--white);
    /* Flip for RTL send direction */
    transform: scaleX(-1);
  }

  .send-btn:disabled {
    background: var(--surface-3);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .send-btn:disabled svg { fill: var(--text-muted); }

  .input-hint {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    letter-spacing: 0.02em;
  }

  /* ─── STEP PROGRESS BAR ─── */
  .progress-bar-wrap {
    padding: 0 20px 2px;
    flex-shrink: 0;
  }

  .progress-steps {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  .progress-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 6px;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--surface-3);
    z-index: 0;
  }

  .progress-step.done:not(:last-child)::after,
  .progress-step.active:not(:last-child)::after {
    background: linear-gradient(to left, var(--surface-3), var(--white));
  }

  .step-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--surface-3);
    border: 2px solid var(--surface-3);
    z-index: 1;
    transition: all 0.3s ease;
    position: relative;
  }

  .progress-step.active .step-dot {
    background: var(--white);
    border-color: var(--white);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
  }

  .progress-step.done .step-dot {
    background: var(--white);
    border-color: var(--white);
  }

  .step-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .progress-step.active .step-label { color: var(--white); font-weight: 600; }
  .progress-step.done .step-label { color: var(--text-secondary); }

  /* ─── SCROLL ANCHOR ─── */
  #chat-end { height: 1px; flex-shrink: 0; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 480px) {
    .header { height: auto; padding: 0; }
    .chat-container { padding: 20px 14px 12px; }
    .input-area { padding: 10px 12px 14px; }
    .bubble { font-size: 14px; padding: 11px 15px; }
    .status-text { display: none; }
    .progress-bar-wrap { padding: 0 14px 2px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <img src="HEADER1.jpg" alt="המנטור הדיגיטלי של FUTURE" class="header-banner">
  </header>

  <!-- PROGRESS BAR -->
  <div class="progress-bar-wrap">
    <div class="progress-steps" id="progress-steps">
      <div class="progress-step active" data-step="0">
        <div class="step-dot"></div>
        <span class="step-label">הרעיון</span>
      </div>
      <div class="progress-step" data-step="1">
        <div class="step-dot"></div>
        <span class="step-label">הכאב</span>
      </div>
      <div class="progress-step" data-step="2">
        <div class="step-dot"></div>
        <span class="step-label">קהל יעד</span>
      </div>
      <div class="progress-step" data-step="3">
        <div class="step-dot"></div>
        <span class="step-label">Early Adopters</span>
      </div>
      <div class="progress-step" data-step="4">
        <div class="step-dot"></div>
        <span class="step-label">סיכום</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-container" id="chat">
    <div id="chat-end"></div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-inner">
      <textarea
        id="user-input"
        placeholder="כתוב כאן את התשובה שלך..."
        rows="1"
        dir="rtl"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="שלח">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter לשליחה · Shift+Enter לשורה חדשה</div>
    <div class="input-hint" style="margin-top:6px; opacity:0.5;">🔒 השיחה פרטית, אינה נשמרת או מתועדת ונמחקת עם סגירת הדף</div>
  </div>

</div>

<script>
// ─── STATE ───
let step = 0;
let isTyping = false;

const STEPS = [
  { label: 'הרעיון', active: true },
  { label: 'הכאב' },
  { label: 'קהל יעד' },
  { label: 'Early Adopters' },
  { label: 'סיכום' }
];

const MENTOR_RESPONSES = [
  // Step 0 → after welcome (user's first message)
  `מעניין מאוד! עכשיו בוא נחפור קצת עמוק יותר. 🔍

ספר לי — מי הסובל הכי הרבה מהבעיה הזו? תנסה לתאר לי אדם ספציפי, לא קבוצה כללית. למשל: ״בחור בן 25 שעובד בחברת הייטק ומתקשה ב...״`,

  // Step 1 → after pain description
  `אוקיי, מתחיל להתבהר. שאלה חשובה עכשיו:

אם תוכל לגשת מחר לעשרה אנשים שסובלים מהבעיה הזו — מאיפה היית מוצא אותם? איפה הם מתקבצים? (פיזית או דיגיטלית)

זה יעזור לנו להגדיר את ה-Early Adopters שלך — אלה האנשים הראשונים שיאמצו את הפתרון.`,

  // Step 2 → after target audience
  null // triggers STATUS CARD
];

// ─── INIT ───
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    addMentorMessage(`איזה כיף שבאת! אני המנטור הדיגיטלי של Future, מרכז היזמות והחדשנות . אני כאן בשבילך! בוא נתחיל בזה שתספר לי בקצרה על המיזם שלך ועל איזו בעיה הוא פותר.`);
  }, 600);
  setupInput();
  updateProgress(0);
});

// ─── SEND ───
function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const responseIndex = step;
  step++;
  updateProgress(step);

  setTimeout(() => {
    showTyping();
    const delay = 1500 + Math.random() * 800;
    setTimeout(() => {
      hideTyping();
      if (MENTOR_RESPONSES[responseIndex] === null) {
        // Show status card
        addStatusCard();
        updateProgress(4);
      } else if (MENTOR_RESPONSES[responseIndex]) {
        addMentorMessage(MENTOR_RESPONSES[responseIndex]);
      }
      document.getElementById('send-btn').disabled = false;
    }, delay);
  }, 400);
}

// ─── ADD MESSAGES ───
function addUserMessage(text) {
  const now = getTime();
  const html = `
    <div class="message-row user">
      <div class="avatar user-avatar">אתה</div>
      <div class="bubble-wrap">
        <div class="bubble user-bubble">${escapeHtml(text)}</div>
        <div class="message-time">${now}</div>
      </div>
    </div>
  `;
  insertBeforeEnd(html);
  scrollToBottom();
}

function addMentorMessage(text) {
  const now = getTime();
  const avatarContent = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px"><circle cx="12" cy="12" r="3" fill="#ffffff"/><path d="M12 2 L13.2 8.8 L19.6 6.4 L15.2 11.2 L22 12 L15.2 12.8 L19.6 17.6 L13.2 15.2 L12 22 L10.8 15.2 L4.4 17.6 L8.8 12.8 L2 12 L8.8 11.2 L4.4 6.4 L10.8 8.8 Z" fill="#ffffff" opacity="0.7"/></svg>`;
  const html = `
    <div class="message-row mentor">
      <div class="avatar mentor-avatar">${avatarContent}</div>
      <div class="bubble-wrap">
        <div class="bubble mentor-bubble">${escapeHtml(text)}</div>

}

// ─── TYPING ───
function showTyping() {
  isTyping = true;
  const avatarSvg = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:22px"><circle cx="12" cy="12" r="3" fill="#ffffff"/><path d="M12 2 L13.2 8.8 L19.6 6.4 L15.2 11.2 L22 12 L15.2 12.8 L19.6 17.6 L13.2 15.2 L12 22 L10.8 15.2 L4.4 17.6 L8.8 12.8 L2 12 L8.8 11.2 L4.4 6.4 L10.8 8.8 Z" fill="#ffffff" opacity="0.7"/></svg>`;
  const html = `
    <div class="typing-row" id="typing-indicator">
      <div class="avatar mentor-avatar">${avatarSvg}</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  insertBeforeEnd(html);
  scrollToBottom();
}

function hideTyping() {
  isTyping = false;
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ─── PROGRESS ───
function updateProgress(activeStep) {
  const steps = document.querySelectorAll('.progress-step');
  steps.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < activeStep) el.classList.add('done');
    else if (i === activeStep) el.classList.add('active');
  });
}

// ─── HELPERS ───
function insertBeforeEnd(html) {
  const chat = document.getElementById('chat');
  const end = document.getElementById('chat-end');
  const div = document.createElement('div');
  div.innerHTML = html;
  while (div.firstChild) {
    chat.insertBefore(div.firstChild, end);
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    const end = document.getElementById('chat-end');
    end.scrollIntoView({ behavior: 'smooth', block: 'end' });
  });
}

function getTime() {
  return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ─── INPUT SETUP ───
function setupInput() {
  const input = document.getElementById('user-input');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
}
</script>
