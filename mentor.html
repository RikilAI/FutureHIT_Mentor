<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUTURE Mentor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #111111;
    --surface:    #1a1a1a;
    --surface-2:  #222222;
    --border:     rgba(255,255,255,0.07);
    --border-mid: rgba(255,255,255,0.13);
    --accent:     #5b8db8;
    --text-1:     #efefef;
    --text-2:     #999999;
    --text-3:     #505050;
    --radius:     13px;
    --radius-sm:  8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans Hebrew', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 700px;
    margin: 0 auto;
  }

  .header { flex-shrink: 0; line-height: 0; }
  .header img { width: 100%; display: block; object-fit: cover; max-height: 110px; }

  .progress-bar-wrap {
    flex-shrink: 0;
    padding: 12px 20px 9px;
    border-bottom: 1px solid var(--border);
  }
  .progress-steps { display: flex; align-items: center; }
  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
  }
  .progress-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 4px; left: 0;
    width: 100%; height: 1px;
    background: var(--border);
    z-index: 0;
  }
  .progress-step.done:not(:last-child)::after { background: rgba(255,255,255,0.18); }
  .step-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1.5px solid var(--border-mid);
    z-index: 1;
    transition: all 0.3s ease;
  }
  .progress-step.active .step-dot { background: var(--text-1); border-color: var(--text-1); }
  .progress-step.done   .step-dot { background: var(--text-3); border-color: var(--text-3); }
  .step-label { font-size: 9px; color: var(--text-3); white-space: nowrap; }
  .progress-step.active .step-label { color: var(--text-2); font-weight: 600; }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 22px 18px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 3px; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 2px; }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 9px;
    animation: msg-in 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message-row.mentor { flex-direction: row; }
  .message-row.user   { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
  }
  .avatar.mentor-avatar { background: var(--surface-2); border: 1px solid var(--border-mid); overflow: hidden; }
  .avatar.user-avatar   { background: var(--surface); border: 1px solid var(--border); color: var(--text-3); }

  .bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: calc(100% - 44px); }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.72;
    font-weight: 400;
    white-space: pre-line;
  }
  .mentor-bubble {
    background: var(--surface);
    color: var(--text-1);
    border-radius: var(--radius) var(--radius) var(--radius) 3px;
    border: 1px solid var(--border);
  }
  .user-bubble {
    background: var(--surface-2);
    color: var(--text-1);
    border-radius: var(--radius) var(--radius) 3px var(--radius);
    border: 1px solid var(--border);
  }
  .message-time { font-size: 10px; color: var(--text-3); padding: 0 3px; }
  .message-row.user   .message-time { text-align: left; }
  .message-row.mentor .message-time { text-align: right; }

  .typing-row { display: flex; align-items: flex-end; gap: 9px; animation: msg-in 0.22s ease both; }
  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 3px;
    padding: 13px 15px;
    display: flex; align-items: center; gap: 5px;
  }
  .typing-dot {
    width: 5px; height: 5px;
    background: var(--text-3);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,100% { transform: translateY(0); opacity: 0.3; }
    50%     { transform: translateY(-4px); opacity: 0.85; }
  }

  .choice-wrap {
    display: flex; flex-direction: column; gap: 6px;
    margin-right: 39px;
    animation: msg-in 0.28s ease both;
  }
  .choice-btn {
    background: transparent;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 9px 15px;
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-size: 14px;
    color: var(--text-2);
    cursor: pointer;
    text-align: right;
    direction: rtl;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .choice-btn:hover { background: var(--surface-2); border-color: rgba(255,255,255,0.2); color: var(--text-1); }
  .choice-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .chat-divider { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
  .chat-divider::before, .chat-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .summary-card-header { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); }
  .summary-card-title { font-size: 12px; font-weight: 600; color: var(--text-2); letter-spacing: 0.05em; text-transform: uppercase; }
  .summary-section {
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    animation: section-in 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  .summary-section:last-child { border-bottom: none; }
  .summary-section:nth-child(1) { animation-delay: 0.07s; }
  .summary-section:nth-child(2) { animation-delay: 0.16s; }
  .summary-section:nth-child(3) { animation-delay: 0.25s; }
  .summary-section:nth-child(4) { animation-delay: 0.34s; }
  @keyframes section-in {
    from { opacity: 0; transform: translateX(-5px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .summary-label { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  .summary-content { font-size: 13.5px; line-height: 1.68; color: var(--text-2); }
  .summary-card-footer { padding: 11px 18px; border-top: 1px solid var(--border); }
  .summary-footer-text { font-size: 11px; color: var(--text-3); }

  .input-area {
    flex-shrink: 0;
    padding: 9px 14px 13px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .input-inner {
    display: flex; align-items: flex-end; gap: 9px;
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    padding: 9px 9px 9px 13px;
    transition: border-color 0.2s;
  }
  .input-inner:focus-within { border-color: rgba(255,255,255,0.2); }
  #user-input {
    flex: 1; border: none; outline: none;
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-size: 14.5px; line-height: 1.5;
    color: var(--text-1); background: transparent;
    resize: none; min-height: 22px; max-height: 120px;
    overflow-y: auto; direction: rtl;
  }
  #user-input::placeholder { color: var(--text-3); }
  .send-btn {
    width: 34px; height: 34px;
    background: var(--surface-2);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent); border-color: var(--accent); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 15px; height: 15px; fill: var(--text-2); transform: scaleX(-1); }
  .send-btn:hover svg { fill: #fff; }
  .send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
  .input-hint { text-align: center; font-size: 10px; color: var(--text-3); margin-top: 6px; }

  #chat-end { height: 1px; flex-shrink: 0; }

  @media (max-width: 480px) {
    .chat-container { padding: 14px 13px 8px; }
    .input-area { padding: 7px 11px 11px; }
    .bubble { font-size: 14px; }
    .step-label { font-size: 8px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <img src="HEADER1.jpg" alt="FUTURE Mentor">
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-steps" id="progress-steps">
      <div class="progress-step active"  data-step="0"><div class="step-dot"></div><span class="step-label">רעיון וכאב</span></div>
      <div class="progress-step"         data-step="1"><div class="step-dot"></div><span class="step-label">פרסונה</span></div>
      <div class="progress-step"         data-step="2"><div class="step-dot"></div><span class="step-label">מחקר</span></div>
      <div class="progress-step"         data-step="3"><div class="step-dot"></div><span class="step-label">בחינת הרעיון</span></div>
      <div class="progress-step"         data-step="4"><div class="step-dot"></div><span class="step-label">מודל עסקי</span></div>
      <div class="progress-step"         data-step="5"><div class="step-dot"></div><span class="step-label">ולידציה</span></div>
      <div class="progress-step"         data-step="6"><div class="step-dot"></div><span class="step-label">Lean Test</span></div>
      <div class="progress-step"         data-step="7"><div class="step-dot"></div><span class="step-label">סיכום</span></div>
    </div>
  </div>

  <div class="chat-container" id="chat">
    <div id="chat-end"></div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <textarea id="user-input" placeholder="כתוב כאן..." rows="1" dir="rtl"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="שלח">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter לשליחה · Shift+Enter לשורה חדשה · השיחה אינה נשמרת</div>
  </div>

</div>
<script>
const AVT = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:17px;height:17px;display:block"><circle cx="12" cy="8" r="4" stroke="#888" stroke-width="1.5"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#888" stroke-width="1.5" stroke-linecap="round"/></svg>`;

// ── STATE ──
let stage = 0;
let clarify = 0;
let isTyping = false;
let awaitResearch = false;
let awaitPeople   = false;
let awaitLean     = false;
let researchSub = null;
let peopleSub   = null;
let leanSub     = null;

// ── MESSAGES ──
const M = {
  welcome: `איזה כיף שבאת!\nאני המנטור הדיגיטלי של FUTURE — מרכז היזמות והחדשנות.\nאני כאן בשבילך כדי לחשוב איתך על הרעיון שלך.\nבוא נתחיל בזה שתספר לי בקצרה על המיזם שלך ועל איזו בעיה הוא פותר.`,

  ideaOnlyIdea: `הבנתי שיש לך פתרון בראש. לפני שנדבר עליו — מה הבעיה שגרמה לך לחשוב עליו מלכתחילה?\nכשמגדירים את הבעיה קודם, הרעיון נהיה הרבה יותר ממוקד.`,

  ideaOnlyPain: `הבנתי את הכאב. אבל איזה פתרון אתה מציע לו? מה הרעיון שלך בדיוק?`,

  ideaWeak: `זה עוד קצת כללי. תן לי לשאול אחרת: מה קורה לאדם שחווה את הבעיה הזאת ביום רגיל? ומה הפתרון שלך עושה שלא קיים היום?`,

  personaOpen: `טוב, יש לנו את הרעיון ואת הכאב.\nעכשיו בוא נגדיר למי אנחנו פותרים. אנחנו קוראים לזה "פרסונה" — תמונה של אדם אחד ספציפי שהבעיה הזאת הכי רלוונטית לו. לא קבוצה, לא "כולם" — אדם אחד.\nתאר לי אותו: בן כמה, מה הוא עושה, ואיך הבעיה הזאת נראית בחייו?`,

  personaWeak: `הפרסונה עדיין קצת רחבה. כשמנסים לדבר עם כולם — בסוף לא מגיעים לאף אחד.\nחשוב על הלקוח הראשון שישלם לך — לא הגדול ביותר, אלא זה שהכאב שלו הכי בוער. מי הוא?`,

  researchOpen: `כדי לבחון רעיון לעומק, חשוב קודם להכיר את האקוסיסטם שאתה נכנס אליו — מה קיים כבר, מי המתחרים, אילו מודלים עסקיים פועלים בשוק הזה, ומה אנשים מתלוננים עליו.\nמחקר דיגיטלי מוקדם חוסך טעויות יקרות.\nעשית מחקר כזה על עולם הבעיה?`,

  researchYes: `מצוין. תשתף מה מצאת — מה קיים בשוק, אילו מתחרים זיהית, ומה למדת על המודלים שפועלים בתחום?`,

  researchNo: `בסדר. כדאי מאוד לעשות את זה לפני שממשיכים — זה משנה את כל הדיון.\nחפש מתחרים ישירים ועקיפים, ראה מה אנשים מתלוננים עליהם בפורומים, והסתכל אילו מודלי הכנסה קיימים בתחום.\nרוצה להמשיך עכשיו בלי המחקר, או לחזור אחרי שתעשה אותו?`,

  researchAnalysis: `קראתי. שאלה אחת לפני שנמשיך: מה בין כל מה שמצאת הכי מפתיע אותך — ומה זה אומר על הרעיון שלך?`,

  researchSkipOk: `בסדר, נמשיך. חשוב שתדע שחלק מהשאלות הבאות יהיו קלות יותר אחרי מחקר.`,

  validationOpen: `עכשיו בוא נבחן את הרעיון לאורה של כל מה שיש לנו.\nשלוש שאלות שאני שואל כל יזם בשלב הזה:\nראשית — למה עכשיו? מה השתנה לאחרונה שגורם לרעיון הזה להיות רלוונטי דווקא היום?\nשנית — מה ההנחה המרכזית שאם תגלה שהיא לא נכונה, הרעיון מתמוטט?\nשלישית — מה הסיבה שדווקא אתה הכי מתאים לפתור את הבעיה הזאת?`,

  validationWeak: `חלק מהתשובות עדיין צריכות חידוד. נתמקד ב"למה עכשיו" — כי זו השאלה שכל משקיע ולקוח ישאל.\nאם הרעיון הזה היה יכול לקום לפני חמש שנים — למה לא קם? מה השתנה? טכנולוגיה, רגולציה, שינוי התנהגות?`,

  bizOpen: `עכשיו השאלה שיזמים הכי אוהבים לדחות.\nמי משלם, על מה בדיוק, ומה גורם לו לפתוח את הארנק? לא צריך מספרים מדויקים — אני רוצה להבין את המנגנון.`,

  bizWeak: `המנגנון עדיין לא ברור לי. יש הבדל בין "מי ישתמש" לבין "מי ישלם" — הם לא תמיד אותו אדם.\nתחשוב על הרגע שבו מישהו מחליט לשלם — מה גרם לו להחלטה הזאת? מה הוא מרוויח?`,

  peopleOpen: `עד עכשיו עבדנו על ההנחות. עכשיו השאלה היא כמה מהן נבדקו עם אנשים אמיתיים.\nדיברת עם אנשים שמתאימים לפרסונה שתיארת — שיחות עומק, לא "שאלתי חבר"?`,

  peopleYes: `מה למדת? מה אישר את מה שחשבת — ומה הפתיע אותך?`,

  peopleNo: `בסדר. שלוש שיחות עומק יכולות לשנות לגמרי את הכיוון ולחסוך חודשים של בנייה לא נכונה.\nהשאלה שמומלץ לפתוח איתה: "ספר לי על הפעם האחרונה שנתקלת בבעיה הזאת." — אל תמכור, רק תקשיב.`,

  leanOpen: `לפני שמפתחים כלום — יש שלב שהרבה יזמים מדלגים עליו ומשלמים על זה מאוחר יותר.\nהרעיון פשוט: להציע את הפתרון כאילו הוא כבר קיים ולראות מה קורה. דף נחיתה עם הרשמה, פוסט בקהילה רלוונטית, שירות ידני שאתה מדמה בעצמך.\nעשית משהו כזה?`,

  leanYes: `מה עשית ומה קיבלת בחזרה?`,

  leanNo: `בסדר. הגרסה הכי מינימלית: פוסט בקהילה רלוונטית שמציג את הפתרון כאילו הוא קיים — ותראה מי מגיב, מי שואל, מי מבקש גישה.`,
};

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  setupInput();
  updateProgress(0);
  setTimeout(() => mentorSay(M.welcome), 500);
});

// ── SEND ──
function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isTyping) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      document.getElementById('send-btn').disabled = false;
      processResponse(text);
    }, 1100 + Math.random() * 800);
  }, 280);
}

// ── LOGIC ──
function processResponse(text) {
  const t = text.trim();

  // STAGE 0 — idea + pain
  if (stage === 0) {
    const hasIdea = /רעיון|בונה|אפליקציה|פלטפורמה|שירות|מוצר|פרויקט|מיזם|כלי|מערכת/i.test(t);
    const hasPain = /בעיה|כאב|מתקשה|מכביד|קשה|מסובך|מפריע|חסר|לא יכול|מתעסק|לוקח|עולה|בזבוז|תסכול/i.test(t);
    const tooShort = t.length < 35;

    if (clarify === 0) {
      if (tooShort) { clarify++; mentorSay(M.ideaWeak); return; }
      if (hasIdea && !hasPain) { clarify++; mentorSay(M.ideaOnlyIdea); return; }
      if (hasPain && !hasIdea) { clarify++; mentorSay(M.ideaOnlyPain); return; }
      if (isWeak(t)) { clarify++; mentorSay(M.ideaWeak); return; }
    }

    clarify = 0; stage = 1; updateProgress(1);
    mentorSay(M.personaOpen);
    return;
  }

  // STAGE 1 — persona
  if (stage === 1) {
    if (isWeak(t) && clarify === 0) { clarify++; mentorSay(M.personaWeak); return; }
    clarify = 0; stage = 2; updateProgress(2);
    awaitResearch = true;
    mentorSay(M.researchOpen);
    setTimeout(() => addChoices('res', [
      { label: 'כן, עשיתי מחקר', value: 'yes' },
      { label: 'לא עדיין', value: 'no' }
    ]), 200);
    return;
  }

  // STAGE 2 — research
  if (stage === 2) {
    if (awaitResearch) {
      awaitResearch = false;
      const yes = /כן|עשיתי|מחקר|חיפשתי|בדקתי|ראיתי|yes/.test(t);
      if (yes) {
        researchSub = 'findings';
        mentorSay(M.researchYes);
      } else {
        researchSub = 'skipped';
        mentorSay(M.researchNo);
        setTimeout(() => addChoices('res2', [
          { label: 'אמשיך עכשיו', value: 'continue' },
          { label: 'אחזור עם ממצאים', value: 'later' }
        ]), 200);
      }
      return;
    }
    if (researchSub === 'findings') {
      researchSub = 'analysis';
      mentorSay(M.researchAnalysis);
      return;
    }
    if (researchSub === 'analysis') {
      researchSub = null; stage = 3; updateProgress(3);
      mentorSay(M.validationOpen);
      return;
    }
    if (researchSub === 'skipped') {
      const cont = /ממשיך|עכשיו|continue|אמשיך/.test(t);
      if (cont) {
        researchSub = null; stage = 3; updateProgress(3);
        mentorSay(M.researchSkipOk + '\n\n' + M.validationOpen);
      } else {
        // chose "later" or anything else — hold stage, wait for research
        researchSub = 'waiting';
        mentorSay(`בסדר. כשתחזור עם הממצאים — שתף אותם כאן ונמשיך משם.`);
      }
      return;
    }
    if (researchSub === 'waiting') {
      // user came back with research findings
      researchSub = 'analysis';
      mentorSay(M.researchAnalysis);
      return;
    }
    return;
  }

  // STAGE 3 — validation
  if (stage === 3) {
    if (isWeak(t) && clarify === 0) { clarify++; mentorSay(M.validationWeak); return; }
    clarify = 0; stage = 4; updateProgress(4);
    mentorSay(M.bizOpen);
    return;
  }

  // STAGE 4 — biz model
  if (stage === 4) {
    if (isWeak(t) && clarify === 0) { clarify++; mentorSay(M.bizWeak); return; }
    clarify = 0; stage = 5; updateProgress(5);
    awaitPeople = true;
    mentorSay(M.peopleOpen);
    setTimeout(() => addChoices('ppl', [
      { label: 'כן, דיברתי עם אנשים', value: 'yes' },
      { label: 'לא עדיין', value: 'no' }
    ]), 200);
    return;
  }

  // STAGE 5 — people
  if (stage === 5) {
    if (awaitPeople) {
      awaitPeople = false;
      const yes = /כן|דיברתי|ראיינתי|שוחחתי|yes/.test(t);
      if (yes) {
        peopleSub = 'findings';
        mentorSay(M.peopleYes);
      } else {
        peopleSub = null;
        mentorSay(M.peopleNo);
        setTimeout(() => moveToLean(), 600);
      }
      return;
    }
    if (peopleSub === 'findings') {
      peopleSub = null;
      mentorSay(`מעניין. קח את מה שלמדת ותיישם אותו על שאלת המודל העסקי — מי מהם היה הכי קרוב לשלם?`);
      setTimeout(() => moveToLean(), 600);
      return;
    }
    return;
  }

  // STAGE 6 — lean
  if (stage === 6) {
    if (awaitLean) {
      awaitLean = false;
      const yes = /כן|עשיתי|פרסמתי|נחיתה|פוסט|בדקתי|yes/.test(t);
      if (yes) {
        leanSub = 'findings';
        mentorSay(M.leanYes);
      } else {
        leanSub = null;
        mentorSay(M.leanNo);
        setTimeout(() => moveToSummary(), 600);
      }
      return;
    }
    if (leanSub === 'findings') {
      leanSub = null;
      mentorSay(`טוב. זה בדיוק המידע הנכון לקחת קדימה.`);
      setTimeout(() => moveToSummary(), 600);
      return;
    }
    return;
  }

  // STAGE 7 — open Q&A after summary
  if (stage === 7) {
    if (/מחקר|מתחרים|אקוסיסטם|שוק/.test(t)) {
      mentorSay(`מחקר שוק טוב מכסה שלושה דברים:\n1. מתחרים ישירים ועקיפים — חפש ב-Google, Product Hunt, ו-App Store לפי הבעיה שאתה פותר, לא לפי שם הפתרון שלך.\n2. תלונות קיימות — Reddit, קבוצות פייסבוק, ביקורות על מתחרים — מה אנשים אומרים שחסר?\n3. מודלי הכנסה — איך המתחרים מרוויחים? Freemium? מנוי? עסקה חד פעמית? זה מלמד הרבה על מה השוק מוכן לשלם.`);
    } else if (/פרסונה|קהל יעד|לקוח/.test(t)) {
      mentorSay(`פרסונה טובה היא לא דמוגרפיה — היא כאב ספציפי ברגע ספציפי.\nתנסה לנסח כך: "אני פותר ל[תפקיד/מצב] שמתמודד עם [כאב ספציפי] ברגע שבו [הקשר]." כשזה עובד — אתה יודע בדיוק עם מי לדבר ומה להגיד.`);
    } else if (/מודל עסקי|מרוויח|לשלם|תמחור/.test(t)) {
      mentorSay(`שאלת המפתח במודל עסקי היא לא "כמה לגבות" אלא "מה גורם לאדם להוציא ארנק." שלושה מנגנונים עיקריים:\n1. חיסכון בכסף או זמן שאפשר למדוד.\n2. פחד מהפסד — רגולציה, סיכון, פספוס הזדמנות.\n3. סטטוס וגישה — משהו שהמתחרה לא יכול להשיג.\nמה מהשלושה הכי מדויק לרעיון שלך?`);
    } else if (/ולידציה|בדיקה|לבדוק|לדבר עם/.test(t)) {
      mentorSay(`הכלל הפשוט לשיחת ולידציה: אל תציג את הפתרון, שאל רק על הבעיה.\n"ספר לי על הפעם האחרונה שנתקלת ב..." — ואז תקשיב. אל תמכור, אל תסביר, אל תגן. רק תכיר את העולם שלהם.`);
    } else if (/lean|נחיתה|לבדוק בלי|mvp/.test(t)) {
      mentorSay(`Lean Validation = להראות שיש ביקוש לפני שבונים.\nשלוש גישות לפי רמת מאמץ:\n1. פוסט בקהילה רלוונטית שמציג את הפתרון — תסתכל על תגובות ושאלות.\n2. דף נחיתה עם הרשמה לרשימת המתנה — מודד כוונה.\n3. שירות ידני — תעשה בעצמך מה שהמוצר אמור לעשות, תראה אם מישהו רוצה לשלם.`);
    } else {
      mentorSay(`מה בדיוק אתה מנסה להבין — על הרעיון, על הפרסונה, על המודל העסקי, או על הדרך קדימה?`);
    }
  }
}

function moveToLean() {
  stage = 6; updateProgress(6);
  awaitLean = true;
  mentorSay(M.leanOpen);
  setTimeout(() => addChoices('lean', [
    { label: 'כן, בדקתי כך', value: 'yes' },
    { label: 'לא עדיין', value: 'no' }
  ]), 200);
}

function moveToSummary() {
  stage = 7; updateProgress(7);
  addSummaryCard();
}

function isWeak(t) {
  if (t.length < 28) return true;
  // weak only when the phrase is the *answer* itself, not context
  const weakPhrases = ['לא יודע','לא חשבתי','בערך','כל אחד יכול','כל אחד צריך','כולם צריכים','הרבה אנשים בכלל'];
  return weakPhrases.some(p => t.includes(p));
}

// ── CHOICES ──
function addChoices(id, choices) {
  insertBeforeEnd(`<div class="choice-wrap" id="c-${id}">${
    choices.map(c => `<button class="choice-btn" onclick="pick('${c.value}','${id}',this)">${c.label}</button>`).join('')
  }</div>`);
  scrollToBottom();
}
function pick(value, id, btn) {
  document.querySelectorAll(`#c-${id} .choice-btn`).forEach(b => b.disabled = true);
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ── MESSAGES ──
function mentorSay(text) {
  const now = getTime();
  insertBeforeEnd(`<div class="message-row mentor">
    <div class="avatar mentor-avatar">${AVT}</div>
    <div class="bubble-wrap">
      <div class="bubble mentor-bubble">${esc(text)}</div>
      <div class="message-time">${now}</div>
    </div>
  </div>`);
  scrollToBottom();
}

function addUserMessage(text) {
  const now = getTime();
  insertBeforeEnd(`<div class="message-row user">
    <div class="avatar user-avatar">אתה</div>
    <div class="bubble-wrap">
      <div class="bubble user-bubble">${esc(text)}</div>
      <div class="message-time">${now}</div>
    </div>
  </div>`);
  scrollToBottom();
}

function addSummaryCard() {
  mentorSay(`עבדנו על הרעיון שלך לעומק. הנה מה שבנינו ביחד.`);
  setTimeout(() => {
    const now = getTime();
    insertBeforeEnd(`<div class="chat-divider"><span class="divider-text">סיכום השיחה</span></div>`);
    insertBeforeEnd(`<div class="message-row mentor" style="align-items:flex-start">
      <div class="avatar mentor-avatar" style="margin-top:3px">${AVT}</div>
      <div class="bubble-wrap" style="max-width:calc(100% - 44px);width:100%">
        <div class="summary-card">
          <div class="summary-card-header">
            <div class="summary-card-title">סיכום — מנטור FUTURE</div>
          </div>
          <div class="summary-section">
            <div class="summary-label">מה עבדנו עליו</div>
            <div class="summary-content">עברנו על הרעיון והכאב שמאחוריו, הגדרנו פרסונה ראשונית, בחנו את האקוסיסטם התחרותי, בדקנו את ההנחות שהרעיון יושב עליהן, ואת המודל העסקי.</div>
          </div>
          <div class="summary-section">
            <div class="summary-label">זווית לחשיבה</div>
            <div class="summary-content">כוחו של רעיון טוב נמדד לא בגודל הפתרון אלא בחדות הבנת הכאב. ככל שתדייק יותר את מי שסובל ומה בדיוק כואב לו, כל שאר ההחלטות — מוצר, מחיר, שיווק — נהפכות לפשוטות יותר.</div>
          </div>
          <div class="summary-section">
            <div class="summary-label">שלושה צעדים מכאן</div>
            <div class="summary-content">1. שיחת עומק עם שלושה אנשים שמתאימים לפרסונה — שאל רק על הבעיה, לא על הפתרון שלך.\n\n2. נסח משפט אחד: "אני עוזר ל[מי] לפתור [מה] — בשונה מ[מה שקיים] בזכות [מה שמיוחד בך]."\n\n3. הגדר את הגרסה הכי קטנה שאפשר לבדוק תוך שבועיים, לפני שכותבים שורת קוד אחת.</div>
          </div>
          <div class="summary-section">
            <div class="summary-label">שאלה פתוחה לסיום</div>
            <div class="summary-content">מה ההנחה שעדיין הכי מפחידה אותך? זו בדרך כלל הבדיקה הראשונה שצריך לעשות.</div>
          </div>
        </div>
        <div class="message-time">${now}</div>
      </div>
    </div>`);
    scrollToBottom();
  }, 350);
}

// ── TYPING ──
function showTyping() {
  isTyping = true;
  insertBeforeEnd(`<div class="typing-row" id="typing-indicator">
    <div class="avatar mentor-avatar">${AVT}</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  </div>`);
  scrollToBottom();
}
function hideTyping() {
  isTyping = false;
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── PROGRESS ──
function updateProgress(active) {
  document.querySelectorAll('.progress-step').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < active) el.classList.add('done');
    else if (i === active) el.classList.add('active');
  });
}

// ── HELPERS ──
function insertBeforeEnd(html) {
  const chat = document.getElementById('chat');
  const end  = document.getElementById('chat-end');
  const div  = document.createElement('div');
  div.innerHTML = html;
  while (div.firstChild) chat.insertBefore(div.firstChild, end);
}
function scrollToBottom() {
  requestAnimationFrame(() => document.getElementById('chat-end').scrollIntoView({ behavior: 'smooth', block: 'end' }));
}
function getTime() {
  return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function setupInput() {
  const inp = document.getElementById('user-input');
  inp.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,120)+'px'; });
}
</script>
